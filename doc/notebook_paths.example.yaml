# Copy this file to doc/notebook_paths.local.yaml and replace the local values.
# doc/notebook_paths.local.yaml is git-ignored because it contains machine paths.
#
# The custom_database/from_excel walkthrough does not need local config for the
# packaged test workbooks in mario/test/tables; resolve_notebooks.py maps those
# fixtures automatically.

# Optional shared defaults can live at top-level.
# User-specific overrides should live under users.<os_username>.
# The resolver chooses users.<name> from:
# 1) --config-user
# 2) NOTEBOOK_PATHS_USER
# 3) current OS username

# Replacements can be global. They are applied to every selected notebook.
replacements:
  - placeholder: "/path/to/SUPPLY-USE"
    local: "/absolute/local/path/to/SUPPLY-USE"

# Replacements can also be scoped to a notebook, and optionally to code cells.
# Cell indexes are zero-based notebook cell indexes, matching nbformat order.
notebooks:
  source/notebooks/parsers/bea/walkthrough.ipynb:
    replacements:
      - placeholder: "/path/to/SUPPLY-USE.zip"
        local: "/absolute/local/path/to/SUPPLY-USE.zip"
        cells: [5]

  source/notebooks/parsers/eora/walkthrough.ipynb:
    replacements:
      - placeholder: "/path/to/eora26_directory"
        local: "/absolute/local/path/to/Eora26_2017_bp"
      - placeholder: "/path/to/eora26_labels"
        local: "/absolute/local/path/to/indices"

  source/notebooks/parsers/wiod/walkthrough.ipynb:
    # Cells that download large raw data can be left out of the local solve.
    skip_cells: [8]
    replacements:
      - placeholder: "/path/to/WIOT2014_Nov16_ROW.xlsb"
        local: "/absolute/local/path/to/WIOT2014_Nov16_ROW.xlsb"

  source/user_guide/transformations/add_sectors.ipynb:
    replacements:
      - placeholder: "/path/to/add_sector_template.xlsx"
        local: "/absolute/local/path/to/add_sector_template.xlsx"
      - placeholder: "/path/to/add_sector_master_filled.xlsx"
        local: "/absolute/local/path/to/add_sector_master_filled.xlsx"
      - placeholder: "/path/to/add_sector_inventories_filled.xlsx"
        local: "/absolute/local/path/to/add_sector_inventories_filled.xlsx"

# Preferred multi-developer layout (user-specific local paths)
users:
  your_username:
    replacements:
      - placeholder: "/path/to/SUPPLY-USE"
        local: "/your/local/path/to/SUPPLY-USE"
    notebooks:
      source/notebooks/parsers/oecd/walkthrough.ipynb:
        replacements:
          - placeholder: "/path/to/2022_SML.csv"
            local: "/your/local/path/to/2022_SML.csv"
            cells: [8]
          - placeholder: "/path/to/ITA2022ttl.csv"
            local: "/your/local/path/to/ITA2022ttl.csv"
            cells: [10]
